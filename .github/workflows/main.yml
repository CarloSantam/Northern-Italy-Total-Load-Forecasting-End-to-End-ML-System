name: Weather Data Download

on:
  schedule:
    # Run every day at 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-weather-download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Set your Python version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt  # Install project dependencies

      - name: Run Weather Data Download script
        run: |
          python Weather Data Download.py  # Execute your script
